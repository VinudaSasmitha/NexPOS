<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thilak Super - Inventory System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-800 pb-12">

    <div class="bg-green-500 text-white p-4 flex justify-between items-center shadow-md">
        <div>
            <h1 class="text-2xl font-bold tracking-wide">Thilak Super</h1>
            <p class="text-xs font-semibold opacity-90">Inventory System</p>
        </div>
        <button onclick="window.location.href='dashboard.html'"
            class="bg-white/20 px-4 py-2 rounded-full border border-white/50 hover:bg-white/30 transition text-sm font-bold"><i
                class="fas fa-arrow-left mr-2"></i>Menu</button>
    </div>

    <div class="max-w-6xl mx-auto mt-6 bg-white p-8 rounded-xl shadow-sm border border-gray-200">

        <form id="masterForm">
            <div class="mb-8">
                <h2 class="text-sm font-bold text-gray-700 border-l-4 border-green-500 pl-2 mb-4 uppercase">1. Select
                    Category</h2>
                <div class="flex gap-4 overflow-x-auto pb-2 hide-scrollbar">
                    <label class="cursor-pointer shrink-0"><input type="radio" name="category" value="1"
                            class="peer hidden" checked>
                        <div
                            class="w-24 h-24 border-2 border-gray-200 rounded-xl flex flex-col items-center justify-center peer-checked:border-green-500 peer-checked:bg-green-50 peer-checked:text-green-700 hover:bg-gray-50 transition">
                            <i class="fas fa-baby text-2xl mb-2 text-yellow-500"></i><span
                                class="text-xs font-semibold">Baby Items</span>
                        </div>
                    </label>
                    <label class="cursor-pointer shrink-0"><input type="radio" name="category" value="2"
                            class="peer hidden">
                        <div
                            class="w-24 h-24 border-2 border-gray-200 rounded-xl flex flex-col items-center justify-center peer-checked:border-green-500 peer-checked:bg-green-50 hover:bg-gray-50 transition">
                            <i class="fas fa-shopping-basket text-2xl mb-2 text-red-400"></i><span
                                class="text-xs font-semibold">Grocery</span>
                        </div>
                    </label>
                    <label class="cursor-pointer shrink-0"><input type="radio" name="category" value="3"
                            class="peer hidden">
                        <div
                            class="w-24 h-24 border-2 border-gray-200 rounded-xl flex flex-col items-center justify-center peer-checked:border-green-500 peer-checked:bg-green-50 hover:bg-gray-50 transition">
                            <i class="fas fa-wine-glass-alt text-2xl mb-2 text-purple-500"></i><span
                                class="text-xs font-semibold">Beverage</span>
                        </div>
                    </label>
                    <label class="cursor-pointer shrink-0"><input type="radio" name="category" value="4"
                            class="peer hidden">
                        <div
                            class="w-24 h-24 border-2 border-gray-200 rounded-xl flex flex-col items-center justify-center peer-checked:border-green-500 peer-checked:bg-green-50 hover:bg-gray-50 transition">
                            <i class="fas fa-cookie-bite text-2xl mb-2 text-amber-700"></i><span
                                class="text-xs font-semibold">Snacks</span>
                        </div>
                    </label>
                    <label class="cursor-pointer shrink-0"><input type="radio" name="category" value="5"
                            class="peer hidden">
                        <div
                            class="w-24 h-24 border-2 border-gray-200 rounded-xl flex flex-col items-center justify-center peer-checked:border-green-500 peer-checked:bg-green-50 hover:bg-gray-50 transition">
                            <i class="fas fa-broom text-2xl mb-2 text-gray-500"></i><span
                                class="text-xs font-semibold">Household</span>
                        </div>
                    </label>
                    <label class="cursor-pointer shrink-0"><input type="radio" name="category" value="6"
                            class="peer hidden">
                        <div
                            class="w-24 h-24 border-2 border-gray-200 rounded-xl flex flex-col items-center justify-center peer-checked:border-green-500 peer-checked:bg-green-50 hover:bg-gray-50 transition">
                            <i class="fas fa-pump-soap text-2xl mb-2 text-pink-500"></i><span
                                class="text-xs font-semibold">Cosmetics</span>
                        </div>
                    </label>
                    <label class="cursor-pointer shrink-0"><input type="radio" name="category" value="7"
                            class="peer hidden">
                        <div
                            class="w-24 h-24 border-2 border-gray-200 rounded-xl flex flex-col items-center justify-center peer-checked:border-green-500 peer-checked:bg-green-50 hover:bg-gray-50 transition">
                            <i class="fas fa-pills text-2xl mb-2 text-blue-500"></i><span
                                class="text-xs font-semibold">Medicine</span>
                        </div>
                    </label>
                    <label class="cursor-pointer shrink-0"><input type="radio" name="category" value="8"
                            class="peer hidden">
                        <div
                            class="w-24 h-24 border-2 border-gray-200 rounded-xl flex flex-col items-center justify-center peer-checked:border-green-500 peer-checked:bg-green-50 hover:bg-gray-50 transition">
                            <i class="fas fa-box-open text-2xl mb-2 text-orange-400"></i><span
                                class="text-xs font-semibold">Other</span>
                        </div>
                    </label>
                </div>
            </div>

            <div class="mb-8">
                <h2 class="text-sm font-bold text-gray-700 border-l-4 border-green-500 pl-2 mb-4 uppercase">2. Product
                    Details</h2>
                <div class="grid grid-cols-3 gap-6">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">Barcode ID *</label>
                        <input type="text" id="barcode"
                            class="w-full p-2.5 border border-gray-300 rounded focus:ring-1 focus:ring-green-500 outline-none"
                            placeholder="Scan or Type..." required>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">Product Name *</label>
                        <input type="text" id="prodName"
                            class="w-full p-2.5 border border-gray-300 rounded focus:ring-1 focus:ring-green-500 outline-none"
                            placeholder="Ex: Prima Flour" required>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">Brand Name</label>
                        <input type="text" id="brandName"
                            class="w-full p-2.5 border border-gray-300 rounded focus:ring-1 focus:ring-green-500 outline-none"
                            placeholder="Ex: Prima, Keells">
                    </div>
                </div>
            </div>

            <div class="mb-8">
                <h2 class="text-sm font-bold text-gray-700 border-l-4 border-green-500 pl-2 mb-4 uppercase">3. Unit &
                    Stock</h2>
                <div class="grid grid-cols-4 gap-6">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">Unit Type</label>
                        <input type="text" id="unitType"
                            class="w-full p-2.5 border border-gray-300 rounded outline-none"
                            placeholder="Packet, Kg, etc.">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">Size / Weight</label>
                        <input type="text" id="sizeWeight"
                            class="w-full p-2.5 border border-gray-300 rounded outline-none"
                            placeholder="500g, 1L, etc.">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">Stock Quantity *</label>
                        <input type="number" id="qty" class="w-full p-2.5 border border-gray-300 rounded outline-none"
                            value="0" min="0" step="any" required>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">Expire Date</label>
                        <input type="date" id="expireDate"
                            class="w-full p-2.5 border border-gray-300 rounded outline-none text-gray-600">
                    </div>
                </div>
            </div>

            <div class="mb-8">
                <h2 class="text-sm font-bold text-gray-700 border-l-4 border-green-500 pl-2 mb-4 uppercase">4. Pricing &
                    Cost</h2>
                <div class="grid grid-cols-3 gap-6 mb-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">Buying Price (Per Unit) *</label>
                        <input type="number" id="buyPrice" step="0.01"
                            class="w-full p-2.5 border border-gray-300 rounded outline-none" value="0.00" required>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">Retail Price (Selling) *</label>
                        <input type="number" id="retailPrice" step="0.01"
                            class="w-full p-2.5 border border-gray-300 rounded outline-none" value="0.00" required>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">Whole Sale (Selling)</label>
                        <input type="number" id="wholePrice" step="0.01"
                            class="w-full p-2.5 border border-gray-300 rounded outline-none" value="0.00">
                    </div>
                </div>
                <div
                    class="bg-green-50 border border-green-200 p-4 rounded flex justify-between items-center text-sm font-bold">
                    <span class="text-green-800 tracking-wide">Net Profit Per Unit:</span>
                    <span class="text-green-600 text-lg" id="netProfitDisplay">Rs. 0.00</span>
                </div>
            </div>

            <div class="mb-8">
                <h2 class="text-sm font-bold text-gray-700 border-l-4 border-green-500 pl-2 mb-4 uppercase">5. Payment &
                    Accounts</h2>
                <div class="border border-yellow-300 rounded-lg p-5 bg-yellow-50/50">
                    <div class="grid grid-cols-2 gap-6 mb-4">
                        <div>
                            <label class="block text-xs font-bold text-gray-600 mb-1">Total Bill (Cost x Qty)</label>
                            <input type="number" id="totalBill"
                                class="w-full p-2.5 border border-gray-300 rounded bg-gray-100 font-bold outline-none text-gray-600"
                                value="0.00" readonly>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-green-700 mb-1">Amount Paid</label>
                            <input type="number" id="amountPaid" step="0.01"
                                class="w-full p-2.5 border border-green-400 rounded focus:ring-2 focus:ring-green-500 outline-none text-green-800 font-bold"
                                value="0.00">
                        </div>
                    </div>
                    <div class="flex justify-between items-center text-sm font-bold pt-3 border-t border-yellow-300">
                        <span class="text-gray-700">Remaining Due:</span>
                        <span class="text-red-600 text-lg" id="dueDisplay">Rs. 0.00</span>
                    </div>
                </div>
            </div>

            <div class="mb-8">
                <h2 class="text-sm font-bold text-gray-700 border-l-4 border-green-500 pl-2 mb-4 uppercase">6. Supplier
                    Info</h2>
                <div class="border border-gray-200 rounded-lg p-5 bg-gray-50/80">
                    <div class="mb-5">
                        <label class="block text-xs font-bold text-blue-800 mb-2"><i class="fas fa-search mr-1"></i>
                            Select Supplier</label>
                        <select id="supplierSelect"
                            class="w-full p-2.5 border border-gray-300 rounded outline-none font-semibold text-gray-700 bg-white shadow-sm">
                            <option value="NEW">-- Create New Supplier --</option>
                        </select>
                    </div>

                    <div class="grid grid-cols-2 gap-5 pt-2">
                        <div>
                            <label class="block text-xs font-semibold text-gray-500 mb-1">Supplier ID (Auto)</label>
                            <input type="text" id="supIdDisplay"
                                class="w-full p-2.5 border border-gray-200 rounded bg-gray-200 outline-none text-gray-500"
                                placeholder="Auto Generated" readonly>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-500 mb-1">Supplier Name *</label>
                            <input type="text" id="supName"
                                class="w-full p-2.5 border border-gray-300 rounded outline-none" placeholder="Name"
                                required>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-500 mb-1">Phone Number</label>
                            <input type="text" id="supPhone"
                                class="w-full p-2.5 border border-gray-300 rounded outline-none"
                                placeholder="07xxxxxxxx">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-500 mb-1">Notes / Remarks</label>
                            <input type="text" id="supNotes"
                                class="w-full p-2.5 border border-gray-300 rounded outline-none"
                                placeholder="Any details...">
                        </div>
                        <div class="col-span-2">
                            <label class="block text-xs font-semibold text-gray-500 mb-1">Lifetime Total
                                Purchase</label>
                            <input type="text" id="supLifetime"
                                class="w-full p-2.5 border border-gray-200 rounded bg-gray-200 outline-none font-bold text-gray-600"
                                value="0.00" readonly>
                        </div>
                    </div>
                </div>
            </div>

            <div id="alertMsg" class="hidden mb-6 p-4 rounded text-center font-bold text-lg shadow-sm"></div>

            <button type="submit"
                class="w-full bg-[#2c3e50] hover:bg-[#1a252f] text-white p-4 rounded-lg font-bold tracking-widest transition shadow-lg text-lg">
                SAVE STOCK
            </button>
            <button type="button" onclick="document.getElementById('masterForm').reset(); calculateValues();"
                class="w-full mt-3 p-2 text-sm text-gray-500 hover:text-gray-800 transition font-semibold">Clear Form /
                Cancel</button>
        </form>

        <div class="mt-12 pt-8 border-t border-gray-300">
            <h2 class="text-sm font-bold text-gray-700 border-l-4 border-green-500 pl-2 mb-4 uppercase"><i
                    class="fas fa-boxes mr-2 text-green-600"></i> Inventory List</h2>
            <div class="mb-4">
                <input type="text"
                    class="w-full p-2.5 border border-gray-300 rounded outline-none text-sm placeholder-gray-400"
                    placeholder="Search by Name, Barcode, Brand or Category...">
            </div>
            <div class="overflow-x-auto rounded-lg border border-gray-200">
                <table class="w-full text-left text-sm text-gray-600">
                    <thead class="bg-gray-100 text-gray-700 font-bold border-b border-gray-200">
                        <tr>
                            <th class="p-3">Barcode</th>
                            <th class="p-3">Product</th>
                            <th class="p-3">Cost</th>
                            <th class="p-3">Price</th>
                            <th class="p-3 text-center">Stock</th>
                            <th class="p-3 text-center">Batch No</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryTableBody" class="divide-y divide-gray-100 bg-white">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('pos_token');
        if (!token) window.location.href = 'login.html';

        // ================= ELEMENTS =================
        const el = (id) => document.getElementById(id);

        const barcode = el('barcode');
        const prodName = el('prodName');
        const brandName = el('brandName');
        const unitType = el('unitType');
        const sizeWeight = el('sizeWeight');
        const qty = el('qty');
        const expireDate = el('expireDate');

        const buyPrice = el('buyPrice');
        const retailPrice = el('retailPrice');
        const wholePrice = el('wholePrice');

        const totalBill = el('totalBill');
        const amountPaid = el('amountPaid');

        const supplierSelect = el('supplierSelect');
        const supName = el('supName');
        const supPhone = el('supPhone');
        const supNotes = el('supNotes');

        const masterForm = el('masterForm');
        const alertDiv = el('alertMsg');

        let suppliersData = [];

        // ================= SAFE JSON =================
        async function safeJson(res) {
            try {
                return await res.json();
            } catch {
                return null;
            }
        }

        // ================= LOAD DATA =================
        async function loadInitialData() {
            try {
                const res = await fetch('http://localhost:5000/api/suppliers', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const data = await safeJson(res);
                if (!res.ok || !Array.isArray(data)) throw new Error();

                suppliersData = data;

                supplierSelect.innerHTML = '<option value="NEW">-- Create New Supplier --</option>';

                suppliersData.forEach(s => {
                    const opt = document.createElement('option');
                    opt.value = s.Supplier_ID;
                    opt.textContent = `${s.Name || 'Unnamed'} (${s.Phone_Number || 'No Phone'})`;
                    supplierSelect.appendChild(opt);
                });

                loadInventoryList();
            } catch (err) {
                showAlert("❌ Failed to load suppliers", "red");
            }
        }

        // ================= INVENTORY =================
        async function loadInventoryList() {
            try {
                const res = await fetch('http://localhost:5000/api/recent-inventory', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const data = await safeJson(res);
                if (!res.ok || !Array.isArray(data)) throw new Error();

                const tbody = el('inventoryTableBody');
                tbody.innerHTML = '';

                data.forEach(item => {
                    const stock = +item.Stock || 0;

                    tbody.innerHTML += `
                <tr>
                    <td class="p-3">${item.Barcode || '-'}</td>
                    <td class="p-3">${item.Product || '-'}</td>
                    <td class="p-3">Rs.${(+item.Cost || 0).toFixed(2)}</td>
                    <td class="p-3">Rs.${(+item.Price || 0).toFixed(2)}</td>
                    <td class="p-3 text-center ${stock < 5 ? 'text-red-500' : 'text-green-600'}">${stock}</td>
                    <td class="p-3 text-center">${item.Batch_Number || '-'}</td>
                </tr>`;
                });

            } catch {
                showAlert("❌ Inventory load failed", "red");
            }
        }

        // ================= CALCULATIONS =================
        function calculateValues() {
            const buy = Math.max(0, +buyPrice.value || 0);
            const sell = Math.max(0, +retailPrice.value || 0);
            const quantity = Math.max(0, +qty.value || 0);
            const paid = Math.max(0, +amountPaid.value || 0);

            el('netProfitDisplay').innerText = `Rs. ${(sell - buy).toFixed(2)}`;

            const total = buy * quantity;
            totalBill.value = total.toFixed(2);

            const due = total - paid;
            el('dueDisplay').innerText = `Rs. ${due.toFixed(2)}`;
        }

        // events
        [buyPrice, retailPrice, qty, amountPaid].forEach(e => {
            e.addEventListener('input', calculateValues);
        });

        // ================= SUPPLIER AUTO FILL =================
        supplierSelect.addEventListener('change', () => {
            if (supplierSelect.value === "NEW") {
                supName.value = "";
                supPhone.value = "";
                supNotes.value = "";
                return;
            }

            const selected = suppliersData.find(s => String(s.Supplier_ID) === supplierSelect.value);

            if (selected) {
                supName.value = selected.Name || "";
                supPhone.value = selected.Phone_Number || "";
                supNotes.value = selected.Notes || "";
            }
        });

        // ================= BARCODE SCALE PARSER =================
        function parseScaleBarcode(scannedCode) {
            // EAN-13 Barcode Scale Parser (Starts with 21 or 20)
            if (scannedCode.length === 13 && (scannedCode.startsWith('21') || scannedCode.startsWith('20'))) {
                const pluCode = scannedCode.substring(2, 7); // e.g. 00015
                const weightRaw = scannedCode.substring(7, 12); // e.g. 01500
                const weightKg = parseInt(weightRaw) / 1000; // 1.5 kg

                return { isScale: true, productCode: pluCode, weight: weightKg };
            }
            return { isScale: false, barcode: scannedCode };
        }

        // ================= AUTO PRODUCT =================
        async function fetchProductData(scannedCode) {
            if (!scannedCode) return;

            const parsedData = parseScaleBarcode(scannedCode);
            // Search DB with PLU if scale barcode, else full barcode
            const searchCode = parsedData.isScale ? parsedData.productCode : parsedData.barcode;

            try {
                const res = await fetch(`http://localhost:5000/api/products/barcode/${searchCode}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!res.ok) {
                    // Do not show error on new items, just let them type
                    return;
                }

                const p = await safeJson(res);
                if (!p) return;

                // Show the base product code in the UI
                barcode.value = searchCode;
                prodName.value = p.Name || '';
                brandName.value = p.Brand || '';
                unitType.value = p.Unit || '';
                sizeWeight.value = p.Description || '';

                buyPrice.value = p.Cost_Price || 0;
                retailPrice.value = p.Sell_Price || 0;

                if (parsedData.isScale) {
                    qty.value = parsedData.weight;
                    showAlert(`⚡ Scale detected! Auto-filled weight: ${parsedData.weight} Kg`, "green");
                } else {
                    showAlert("⚡ Product details auto-filled!", "green");
                }

                calculateValues();
            } catch { }
        }

        // 1. Mouse එක එලියෙන් ක්ලික් කරද්දී Auto-fill වෙන්න
        barcode.addEventListener('blur', () => fetchProductData(barcode.value.trim()));

        // 2. Scanner එකෙන් Enter එබෙද්දී Auto-fill වෙන්න
        barcode.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();

                const scannedValue = barcode.value.trim();
                fetchProductData(scannedValue);

                const parsedData = parseScaleBarcode(scannedValue);
                if (!parsedData.isScale) {
                    qty.focus();
                } else {
                    amountPaid.focus();
                }
            }
        });

        // ================= BATCH =================
        function generateBatch(code, date) {
            const d = new Date();

            const part = date
                ? date.replace(/-/g, '')
                : `${d.getFullYear()}${String(d.getMonth() + 1).padStart(2, '0')}`;

            return `B-${code}-${part}`;
        }

        // ================= SUBMIT =================
        masterForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!barcode.value.trim() || !prodName.value.trim() || +qty.value <= 0) {
                return showAlert("❌ Fill required fields", "red");
            }

            const total = +totalBill.value || 0;
            const paid = +amountPaid.value || 0;

            const payload = {
                Category_ID: +document.querySelector('input[name="category"]:checked').value,
                Barcode: barcode.value.trim(),
                Product_Name: prodName.value.trim(),
                Brand_Name: brandName.value.trim(),
                Unit_Type: unitType.value.trim(),
                Size_Weight: sizeWeight.value.trim(),
                Stock_Quantity: +qty.value,
                Expire_Date: expireDate.value || null,
                Batch_Number: generateBatch(barcode.value, expireDate.value),

                Buying_Price: +buyPrice.value || 0,
                Retail_Price: +retailPrice.value || 0,
                Wholesale_Price: +wholePrice.value || 0,

                Total_Bill: total,
                Amount_Paid: paid,
                Remaining_Due: total - paid,

                Is_New_Supplier: supplierSelect.value === 'NEW',
                Supplier_ID: supplierSelect.value === 'NEW' ? null : supplierSelect.value,
                Supplier_Name: supName.value.trim(),
                Supplier_Phone: supPhone.value.trim(),
                Supplier_Notes: supNotes.value.trim()
            };

            try {
                const res = await fetch('http://localhost:5000/api/master-receive', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(payload)
                });

                const data = await safeJson(res);

                if (res.ok) {
                    showAlert(`✅ ${data?.message || 'Saved successfully'}`, "green");
                    masterForm.reset();
                    calculateValues();
                    loadInitialData();
                } else {
                    showAlert(data?.message || "Error", "red");
                }

            } catch {
                showAlert("❌ Server Error", "red");
            }
        });

        // ================= ALERT =================
        function showAlert(msg, type) {
            alertDiv.classList.remove('hidden');

            alertDiv.className = `mb-6 p-4 font-bold text-center rounded ${type === "green"
                ? "bg-green-100 text-green-700"
                : "bg-red-100 text-red-700"
                }`;

            alertDiv.innerText = msg;

            setTimeout(() => {
                alertDiv.classList.add('hidden');
            }, 4000);
        }

        // ================= INIT =================
        window.onload = () => {
            calculateValues();
            loadInitialData();
        };
    </script>
</body>

</html>
