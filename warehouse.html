<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warehouse Management - POS v3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="bg-gray-100 font-sans">

    <div class="flex h-screen overflow-hidden">
        <div class="w-64 bg-indigo-900 text-white flex-shrink-0">
            <div class="p-6 text-2xl font-bold border-b border-indigo-800">
                POS System v3
            </div>
            <nav class="mt-6">
                <a href="dashboard.html" class="block py-3 px-6 hover:bg-indigo-800"><i class="fas fa-home mr-3"></i>
                    Dashboard</a>
                <a href="#" class="block py-3 px-6 bg-indigo-800 border-l-4 border-white"><i
                        class="fas fa-warehouse mr-3"></i> Warehouse</a>
                <a href="products.html" class="block py-3 px-6 hover:bg-indigo-800"><i class="fas fa-box mr-3"></i>
                    Products</a>
                <a href="register.html" class="block py-3 px-6 hover:bg-indigo-800"><i
                        class="fas fa-user-plus mr-3"></i> Add Member</a>
            </nav>
        </div>

        <div class="flex-1 flex flex-col overflow-hidden">
            <header class="bg-white shadow-sm py-4 px-8 flex justify-between items-center">
                <h2 class="text-xl font-semibold text-gray-800">Warehouse Operations</h2>
                <div class="flex items-center gap-4">
                    <button onclick="logout()"
                        class="bg-red-50 text-red-600 p-2 rounded-full hover:bg-red-100 transition">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </header>

            <main class="flex-1 overflow-x-hidden overflow-y-auto p-8">
                <div id="alertMsg" class="hidden mb-4 p-4 rounded-lg font-semibold text-center"></div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">

                    <div class="bg-white p-6 rounded-xl shadow-sm border-t-4 border-green-500">
                        <h3 class="text-lg font-bold text-gray-700 mb-4"><i
                                class="fas fa-download text-green-500 mr-2"></i> Stock In (Receive to Warehouse)</h3>
                        <form id="addStockForm" class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700">Product ID</label>
                                <input type="number" id="in_productId" class="w-full mt-1 p-2 border rounded-md"
                                    required>
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700">Quantity</label>
                                    <input type="number" id="in_qty" min="1" class="w-full mt-1 p-2 border rounded-md"
                                        required>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700">Warehouse ID</label>
                                    <input type="number" id="in_warehouseId" value="1"
                                        class="w-full mt-1 p-2 border bg-gray-100 rounded-md" required>
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700">Batch Number</label>
                                    <input type="text" id="in_batch" class="w-full mt-1 p-2 border rounded-md">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700">Expire Date</label>
                                    <input type="date" id="in_expire" class="w-full mt-1 p-2 border rounded-md">
                                </div>
                            </div>
                            <button type="submit"
                                class="w-full bg-green-600 text-white p-2 rounded-lg hover:bg-green-700 font-semibold">Add
                                Stock</button>
                        </form>
                    </div>

                    <div class="bg-white p-6 rounded-xl shadow-sm border-t-4 border-blue-500">
                        <h3 class="text-lg font-bold text-gray-700 mb-4"><i class="fas fa-truck text-blue-500 mr-2"></i>
                            Transfer to Branch</h3>
                        <form id="transferForm" class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700">Product ID</label>
                                <input type="number" id="tr_productId" class="w-full mt-1 p-2 border rounded-md"
                                    required>
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700">Transfer Quantity</label>
                                    <input type="number" id="tr_qty" min="1" class="w-full mt-1 p-2 border rounded-md"
                                        required>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700">To Branch ID</label>
                                    <input type="number" id="tr_branchId" class="w-full mt-1 p-2 border rounded-md"
                                        placeholder="e.g. 2" required>
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700">From Warehouse ID</label>
                                <input type="number" id="tr_warehouseId" value="1"
                                    class="w-full mt-1 p-2 border bg-gray-100 rounded-md" required>
                            </div>
                            <button type="submit"
                                class="w-full bg-blue-600 text-white p-2 rounded-lg hover:bg-blue-700 font-semibold">Send
                                Transfer</button>
                        </form>
                    </div>

                </div>
            </main>
        </div>
    </div>

    <script>
        // Token & Auth Check
        const token = localStorage.getItem('pos_token');
        if (!token) {
            window.location.href = 'login.html';
        }

        function showAlert(message, isSuccess) {
            const alertDiv = document.getElementById('alertMsg');
            alertDiv.className = `mb-4 p-4 rounded-lg font-semibold text-center ${isSuccess ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`;
            alertDiv.innerText = message;
            alertDiv.classList.remove('hidden');
            setTimeout(() => alertDiv.classList.add('hidden'), 5000);
        }

        // 1. Add Stock API Call
        document.getElementById('addStockForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                Product_ID: parseInt(document.getElementById('in_productId').value),
                Warehouse_ID: parseInt(document.getElementById('in_warehouseId').value),
                Branch_ID: null, // Because this goes to Warehouse
                Quantity: parseInt(document.getElementById('in_qty').value),
                Batch_Number: document.getElementById('in_batch').value || null,
                Expire_Date: document.getElementById('in_expire').value || null
            };

            try {
                const response = await fetch('http://localhost:5000/api/inventory', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();

                if (response.ok) {
                    showAlert('📦 Stock added to Warehouse successfully!', true);
                    e.target.reset();
                    document.getElementById('in_warehouseId').value = "1"; // Reset hardcoded value
                } else {
                    showAlert(data.message || 'Failed to add stock', false);
                }
            } catch (err) { showAlert('Server error', false); }
        });

        // 2. Transfer Stock API Call
        document.getElementById('transferForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                Product_ID: parseInt(document.getElementById('tr_productId').value),
                From_Warehouse_ID: parseInt(document.getElementById('tr_warehouseId').value),
                To_Branch_ID: parseInt(document.getElementById('tr_branchId').value),
                Quantity: parseInt(document.getElementById('tr_qty').value)
            };

            try {
                const response = await fetch('http://localhost:5000/api/inventory/transfer', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();

                if (response.ok) {
                    showAlert('🔁 Transfer completed successfully!', true);
                    e.target.reset();
                    document.getElementById('tr_warehouseId').value = "1";
                } else {
                    showAlert(data.message || 'Transfer failed. Check warehouse stock.', false);
                }
            } catch (err) { showAlert('Server error', false); }
        });

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }
    </script>
</body>

</html>
